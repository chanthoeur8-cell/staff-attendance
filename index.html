<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIKIDS Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg: #0a0f1e; --card: #111827; --accent: #00e5ff; 
            --green: #10b981; --red: #ef4444; --text: #f1f5f9; 
            --muted: #64748b; --border: rgba(255,255,255,0.07);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', 'Noto Sans Khmer', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 15px; border: 1px solid var(--border); padding: 20px; text-align: center; margin-bottom: 20px; }
        #qrcode { background: white; padding: 10px; display: inline-block; border-radius: 10px; margin: 15px 0; }
        .scan-box { background: #1a2235; padding: 20px; border-radius: 15px; border: 1px solid var(--accent); }
        select, .btn { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; font-size: 16px; border: none; font-weight: bold; cursor: pointer; }
        select { background: var(--bg); color: white; border: 1px solid var(--border); }
        .btn-in { background: var(--green); color: white; }
        .btn-out { background: #7c3aed; color: white; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 20px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--accent); margin-bottom:15px;">MIKIDS ATTENDANCE</h2>

    <div class="card">
        <h3>QR សម្រាប់ស្កេន</h3>
        <div id="qrcode"></div>
        <p style="font-size:12px; color:var(--muted)">ស្កេនដើម្បីបើកទំព័រនេះលើទូរស័ព្ទ</p>
    </div>

    <div class="scan-box">
        <label>ជ្រើសរើសឈ្មោះបុគ្គលិក:</label>
        <select id="staff-name"></select>
        <button class="btn btn-in" onclick="submitAttendance('in')">✅ ស្កេនចូល (Check-In)</button>
        <button class="btn btn-out" onclick="submitAttendance('out')">🔵 ស្កេនចេញ (Check-Out)</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ឈ្មោះ</th>
                <th>ចូល</th>
                <th>ចេញ</th>
                <th>យឺត</th>
            </tr>
        </thead>
        <tbody id="attendance-list"></tbody>
    </table>
</div>

<script>
const CONFIG = {
    token: '8242266919:AAGE6uMJ_-UvM-3KBZkJVFhJyTLvcTVW5tQ',
    chatId: '-1003584563383',
    lateTime: '07:05', // ម៉ោងកំណត់
    githubLink: 'https://chanthoeur8-cell.github.io/Attendance-staff/'
};

const STAFF_LIST = [
    { name: "Chanthoeurn chhoeurn", role: "IT Support" },
    { name: "Ashley villela", role: "English Teacher" },
    { name: "វិន សេរីភាព", role: "Assistant Teacher" },
    { name: "CHOT HORN", role: "Teacher" },
    { name: "មុឹង ស្រីនីត", role: "Teacher" },
    { name: "អឿន កាណាល់", role: "Teacher" },
    { name: "ប៉ូ សូឌិន", role: "Admin / Teacher" },
    { name: "Leang Sopheavy", role: "Computer Teacher" },
    { name: "Chamnan Veasna", role: "English Teacher" },
    { name: "Born Chhorda", role: "Teacher" },
    { name: "SOK SREYPICE", role: "Teacher" },
    { name: "Eng sreynin", role: "Receptionist" },
    { name: "កុសល សៀកម៉េង", role: "Assistant Teacher" },
    { name: "vat mouy saing", role: "Chinese Teacher" },
    { name: "ឈឹមវ៉ាន លីហង្ស", role: "Teacher" },
    { name: "Dorn Sreyneth", role: "English Teacher" }
];

let records = JSON.parse(localStorage.getItem('mikids_db')) || {};

function formatLate(totalMins) {
    if (totalMins <= 0) return "-";
    const h = Math.floor(totalMins / 60);
    const m = totalMins % 60;
    return h > 0 ? `${h} ម៉ោង ${m} នាទី` : `${m} នាទី`;
}

function renderTable() {
    const list = document.getElementById('attendance-list');
    list.innerHTML = '';
    STAFF_LIST.forEach(s => {
        const r = records[s.name] || { in: '-', out: '-', late: 0 };
        list.innerHTML += `<tr>
            <td><b>${s.name}</b></td>
            <td>${r.in}</td>
            <td>${r.out}</td>
            <td style="color:${r.late > 0 ? 'var(--red)' : 'inherit'}">${formatLate(r.late)}</td>
        </tr>`;
    });
}

async function submitAttendance(type) {
    const name = document.getElementById('staff-name').value;
    if(!name) return alert("សូមជ្រើសរើសឈ្មោះ!");

    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    const time24 = now.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit' });
    const dateStr = now.toLocaleDateString('km-KH');
    const staff = STAFF_LIST.find(s => s.name === name);

    if(type === 'in') {
        if(records[name]) return alert("អ្នកបាន Check-In រួចហើយ!");
        const [th, tm] = CONFIG.lateTime.split(':').map(Number);
        const [ch, cm] = time24.split(':').map(Number);
        let lateMins = (ch * 60 + cm) - (th * 60 + tm);
        lateMins = lateMins > 0 ? lateMins : 0;

        records[name] = { in: timeStr, out: '-', late: lateMins };
        
        sendToTelegram(`🔔 <b>CHECK-IN | MIKIDS</b>\n\n📅 កាលបរិច្ឆេទ: ${dateStr}\n👤 ឈ្មោះ: <b>${name}</b>\n💼 តួនាទី: <i>${staff.role}</i>\n⏰ ម៉ោងចូល: ${timeStr}\n${lateMins > 0 ? '⚠️ យឺត: '+formatLate(lateMins) : '✅ ទាន់ពេល'}`);
    } else {
        if(!records[name]) return alert("សូមស្កេនចូលជាមុនសិន!");
        if(records[name].out !== '-') return alert("អ្នកបានស្កេនចេញរួចហើយ!");
        records[name].out = timeStr;
        sendToTelegram(`🔔 <b>CHECK-OUT | MIKIDS</b>\n\n📅 កាលបរិច្ឆេទ: ${dateStr}\n👤 ឈ្មោះ: <b>${name}</b>\n💼 តួនាទី: <i>${staff.role}</i>\n⏰ ម៉ោងចេញ: ${timeStr}`);
    }

    localStorage.setItem('mikids_db', JSON.stringify(records));
    alert("ជោគជ័យ!");
    renderTable();
}

function sendToTelegram(msg) {
    fetch(`https://api.telegram.org/bot${CONFIG.token}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CONFIG.chatId, text: msg, parse_mode: 'HTML' })
    });
}

window.onload = () => {
    new QRCode(document.getElementById("qrcode"), { text: CONFIG.githubLink, width: 150, height: 150 });
    const select = document.getElementById('staff-name');
    select.innerHTML = '<option value="">-- រើសឈ្មោះរបស់អ្នក --</option>' + STAFF_LIST.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
    renderTable();
};
</script>
</body>
</html>
